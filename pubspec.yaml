name: music_sync_app
description: "It is the frontend for the Music Recognition"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  http: ^1.2.0
  record: ^6.0.0
  path_provider: ^2.1.2
  vibration: ^2.0.0
  palette_generator: ^0.3.3
  flutter_native_splash: ^2.4.0  # ← needs to be here too for the remove() call
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.1  # ← moved here

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"
  min_sdk_android: 23
  adaptive_icon_background: "#795548"
  adaptive_icon_foreground: "assets/icon/icon.png"

flutter_native_splash:
  color: "#3E2723"
  image: assets/icon/icon.png
  color_dark: "#3E2723"
  image_dark: assets/icon/icon.png
  android_12:
    image: assets/icon/icon.png
    color: "#3E2723"
    image_dark: assets/icon/icon.png
    color_dark: "#3E2723"
  fullscreen: true

flutter:
  uses-material-design: true
  assets:
    - assets/icon/